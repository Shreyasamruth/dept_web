{% extends 'base.html' %}

{% block content %}
<div class="auth-card glass-panel anim-fade-up stagger-1" style="max-width: 600px; margin: 0 auto;" data-tilt data-tilt-glare="true" data-tilt-max-glare="0.2" data-tilt-scale="1.02">
    <h2>Edit Certificate</h2>
    <p class="text-muted mb-4">Update details or upload a new PDF for: <strong>{{ cert.title }}</strong> ({{ user.usn }})</p>
    
    <form method="POST" action="{{ url_for('edit_certificate', cert_id=cert.id) }}" enctype="multipart/form-data" id="editForm">
        <div class="form-group">
            <label for="title">Certificate Title</label>
            <input type="text" id="title" name="title" value="{{ cert.title }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea id="description" name="description" rows="3">{{ cert.description }}</textarea>
        </div>
        <div class="form-group file-upload-wrapper">
            <label>Replace PDF File (Leave empty to keep current file)</label>
            <label for="certificate" class="file-label mt-2">
                <span id="file-chosen">Choose a new PDF file...</span>
                <div class="btn-secondary">Browse</div>
            </label>
            <input type="file" id="certificate" name="certificate" accept="application/pdf" class="hidden-input">
            <p class="text-muted text-sm mt-2">Current file: <a href="{{ url_for('uploaded_file', filename=cert.file_path) }}" target="_blank">View</a></p>
        </div>
        
        <div class="d-flex" style="gap: 15px; margin-top: 30px;">
            <button type="submit" class="btn-primary w-100">Save Changes</button>
            <a href="{{ url_for('student_view', usn=user.usn) }}" class="btn-secondary w-100" style="text-align: center; display: inline-block;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
