services:
  - type: web
    name: dept-web
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: FLASK_ENV
        value: production
    disk:
      name: portal-data
      mountPath: /app/instance
      sizeGB: 1
