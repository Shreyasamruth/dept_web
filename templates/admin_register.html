{% extends 'base.html' %}

{% block content %}
<div class="glass-panel anim-fade-up stagger-1" style="max-width: 450px; margin: 4rem auto;" data-tilt data-tilt-glare="true" data-tilt-max-glare="0.2" data-tilt-scale="1.02">
    <h2 class="text-center">Register Admin</h2>
    <p class="text-muted text-center mb-4">You will need to verify your email via OTP.</p>
    <form method="POST" action="{{ url_for('admin_register') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a password">
        </div>
        <button type="submit" class="btn-primary w-100">Send OTP</button>
    </form>
    <div class="text-center mt-4">
        <p class="text-muted text-sm">Already an admin? <a href="{{ url_for('admin_login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
