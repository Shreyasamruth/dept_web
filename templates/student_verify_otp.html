{% extends 'base.html' %}

{% block content %}
<div class="glass-panel anim-fade-up stagger-1" style="max-width: 450px; margin: 4rem auto;" data-tilt data-tilt-glare="true" data-tilt-max-glare="0.2" data-tilt-scale="1.02">
    <h2 class="text-center">Verify Login</h2>
    <p class="text-muted text-center mb-4">Please enter the 6-digit OTP sent to your auto-generated email.</p>
    <form method="POST" action="{{ url_for('student_verify_otp') }}">
        <div class="form-group">
            <label for="otp">One-Time Password (OTP)</label>
            <input type="text" id="otp" name="otp" required placeholder="123456" pattern="\d{6}" title="6 digit OTP">
        </div>
        <button type="submit" class="btn-primary w-100">Verify & Login</button>
    </form>
</div>
{% endblock %}
